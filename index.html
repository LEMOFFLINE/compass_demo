<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI对话助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 移动端顶部切换栏 -->
    <div class="mobile-tabs">
        <button class="tab-btn active" data-tab="sidebar">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M3 4C3 3.44772 3.44772 3 4 3H16C16.5523 3 17 3.44772 17 4V16C17 16.5523 16.5523 17 16 17H4C3.44772 17 3 16.5523 3 16V4Z" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7 3V17" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            对话记录
        </button>
        <button class="tab-btn" data-tab="chat">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M10 2C5.58172 2 2 5.58172 2 10C2 11.5888 2.46254 13.0729 3.26696 14.3323L2.06957 17.2143C1.88504 17.6576 2.28421 18.1302 2.75307 18.0207L6.24905 17.2258C7.38579 17.7247 8.65703 18 10 18C14.4183 18 18 14.4183 18 10C18 5.58172 14.4183 2 10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            对话
        </button>
        <button class="tab-btn" data-tab="output">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M17 3H3C2.46957 3 1.96086 3.21071 1.58579 3.58579C1.21071 3.96086 1 4.46957 1 5V15C1 15.5304 1.21071 16.0391 1.58579 16.4142C1.96086 16.7893 2.46957 17 3 17H17C17.5304 17 18.0391 16.7893 18.4142 16.4142C18.7893 16.0391 19 15.5304 19 15V5C19 4.46957 18.7893 3.96086 18.4142 3.58579C18.0391 3.21071 17.5304 3 17 3Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1 8H19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            计划文件
        </button>
    </div>

    <div class="container">
        <!-- 最左侧对话记录侧边栏 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>对话记录</h2>
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 2.75V13.25M2.75 8H13.25" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    新对话
                </button>
            </div>
            <div class="conversation-list" id="conversationList">
                <div class="conversation-item active" data-id="1">
                    <div class="conversation-title">新对话</div>
                    <div class="conversation-time">刚刚</div>
                </div>
                <div class="conversation-item" data-id="2">
                    <div class="conversation-title">商业模式设计</div>
                    <div class="conversation-time">2小时前</div>
                </div>
                <div class="conversation-item" data-id="3">
                    <div class="conversation-title">融资计划书</div>
                    <div class="conversation-time">昨天</div>
                </div>
            </div>
        </div>

        <!-- 中间对话区域 -->
        <div class="chat-section" id="chatSection">
            <div class="chat-header">
                <h2>AI对话助手</h2>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message ai-message">
                    <div class="message-avatar">AI</div>
                    <div class="message-content">你好，我是你的创业助手。有什么我可以帮你的吗？</div>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="chat-input">
                    <textarea
                        id="messageInput"
                        placeholder="输入消息..."
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M18.364 5.63599C18.8396 6.11164 18.9686 6.83599 18.689 7.44664L11.689 22.4466C11.3914 23.0974 10.638 23.4128 9.96406 23.1699C9.29009 22.9271 8.91539 22.2067 9.09794 21.5135L11.0768 13.5L3.99999 13.5C3.31951 13.5 2.74938 13.0086 2.64945 12.3352C2.54952 11.6619 2.94913 11.0283 3.59999 10.8L16.6 5.79999C17.2353 5.57799 17.9384 5.21038 18.364 5.63599Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 右侧计划文件区域 -->
        <div class="output-section" id="outputSection">
            <div class="output-header">
                <h2>计划文件</h2>
                <button class="new-project-btn" id="newFileBtn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 2.75V13.25M2.75 8H13.25" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    新建文件
                </button>
            </div>

            <div class="output-list" id="outputList">
                <!-- 动态生成文件列表 -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
